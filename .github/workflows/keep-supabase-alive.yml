name: Keep Supabase Alive

on:
  schedule:
    # Runs at 00:00 every 3 days (Supabase free tier pauses after 7 days of inactivity)
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -i -X GET "https://jwcfduvyqatuiwiqtlsw.supabase.co/rest/v1/blog_posts?select=id&limit=1" \
            -H "apikey: sb_publishable_hqmJR93CheQi2HLljPZIfg_UY3p4dPv" \
            -H "Authorization: Bearer sb_publishable_hqmJR93CheQi2HLljPZIfg_UY3p4dPv"
